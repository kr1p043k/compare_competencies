version: '3.8'

services:
  backend:
    image: ghcr.io/kr1p043k/compare_competencies:${BACKEND_TAG:-latest}
    container_name: compare-competencies-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ai-net
      - monitoring
    depends_on:
      competency-postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@competency-postgres:5432/${POSTGRES_DB}
      - OLLAMA_URL=http://ollama:11434
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:${OLLAMA_TAG:-latest}
    container_name: ollama-qwen
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai-net
      - monitoring
    environment:
      - OLLAMA_HOST=0.0.0.0
    command: serve
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_TAG:-main}
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - ai-net
      - monitoring
    deploy:
      resources:
        limits:
          memory: 1G

  n8n:
    image: n8nio/n8n:${N8N_TAG:-latest}
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=Europe/Moscow
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:?err=N8N_DB_PASSWORD not set}
      - DB_POSTGRESDB_DATABASE=n8n
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-}
    depends_on:
      n8n-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-net
      - monitoring

  n8n-postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD:?err=N8N_DB_PASSWORD not set}
      - POSTGRES_DB=n8n
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ai-net
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  competency-postgres:
    image: pgvector/pgvector:pg16
    container_name: competency-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?err=POSTGRES_USER not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err=POSTGRES_PASSWORD not set}
      - POSTGRES_DB=${POSTGRES_DB:-compare_competencies}
    ports:
      - "5432:5432"
    volumes:
      - competency-postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - ai-net
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  prometheus:
    image: prom/prometheus:${PROMETHEUS_TAG:-latest}
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:${GRAFANA_TAG:-latest}
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?err=GRAFANA_PASSWORD not set}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SERVER_ROOT_URL=${GRAFANA_URL:-http://localhost:3001}
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@competency-postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - competency-postgres
    deploy:
      resources:
        limits:
          memory: 128M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    restart: unless-stopped
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ai-net:
    driver: bridge
    name: competency-ai-net
  monitoring:
    driver: bridge
    name: competency-monitoring

volumes:
  ollama-data:
    name: competency-ollama-data
  open-webui-data:
    name: competency-openwebui-data
  n8n-data:
    name: competency-n8n-data
  n8n-postgres-data:
    name: competency-n8n-postgres-data
  competency-postgres-data:
    name: competency-postgres-data
  prometheus-data:
    name: competency-prometheus-data
  grafana-data:
    name: competency-grafana-data